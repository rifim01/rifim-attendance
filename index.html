<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIFIM Attendance</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- ✅ TIDAK ADA googleapis.com/js/api.js — penyebab error sebelumnya -->
  <!-- ✅ TIDAK ADA accounts.google.com/gsi/client -->
</head>

<body>
<div class="dashboard">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="Logo" />
      <h1>RIFIM ERP</h1>
    </div>
    <nav>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="attendance.html" style="color:#ef4444;">📍 Attendance</a>
      <a href="jadwal.html">🗓 Jadwal Shift</a>
      <a href="rekap.html">📈 Rekap</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <h2>Attendance Verification</h2>
        <div id="clock" style="color:#64748b;font-size:14px;margin-top:4px;"></div>
      </div>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="attendance-grid">

      <!-- SELFIE CARD -->
      <div class="attendance-card">
        <h2>📸 Selfie Verification</h2>

        <video id="camera" autoplay playsinline></video>
        <canvas id="snapshot" style="display:none;"></canvas>
        <img id="preview-img"
          style="display:none;width:100%;border-radius:15px;margin-bottom:12px;" />

        <button class="primary-btn" onclick="takePhoto()">
          📷 Ambil Foto
        </button>
        <button id="uploadBtn" class="primary-btn"
          style="margin-top:10px;background:#15803d;" onclick="doUpload()">
          ☁️ Upload Selfie ke Drive
        </button>
        <div id="upload-status"></div>
      </div>

      <!-- GPS CARD -->
      <div class="attendance-card">
        <h2>📍 GPS Validation</h2>

        <div class="gps-info">
          <p><strong>Latitude:</strong>
            <span id="lat" style="font-family:monospace;">⏳</span></p>
          <p><strong>Longitude:</strong>
            <span id="lng" style="font-family:monospace;">⏳</span></p>
          <p><strong>Akurasi:</strong>
            <span id="accuracy">-</span> meter</p>
        </div>

        <div id="gps-status" class="gps-valid">⏳ Memuat GPS...</div>

        <button class="primary-btn" onclick="submitAttendance()">
          🚀 Kirim Absensi
        </button>
        <div id="submit-status" style="margin-top:10px;"></div>
      </div>

    </div>
  </main>
</div>

<script src="google-drive.js"></script>

<script>
// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCROrmmx9cxlAeMEobuT9DAWmVuF1oZrG4",
  authDomain:        "gen-lang-client-0837778946.firebaseapp.com",
  projectId:         "gen-lang-client-0837778946",
  storageBucket:     "gen-lang-client-0837778946.firebasestorage.app",
  messagingSenderId: "984064974556",
  appId:             "1:984064974556:web:42e4771e687590b2595e19",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// ── Konstanta GPS (Hang Nadim Batam) ─────────────────────
const AIRPORT_LAT = 1.1210;
const AIRPORT_LNG = 104.1186;
const RADIUS_KM   = 2.0;

let selfieBlob = null;
let selfieFile = null;
let gpsLat     = null;
let gpsLng     = null;

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleString("id-ID", {
      weekday:"long", year:"numeric", month:"long", day:"numeric",
      hour:"2-digit", minute:"2-digit", second:"2-digit"
    });
}
setInterval(updateClock, 1000);
updateClock();

// ── Auth guard ────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "index.html";
});

// ── Kamera ────────────────────────────────────────────────
const videoEl = document.getElementById("camera");
(async function startCamera() {
  try {
    videoEl.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
  } catch {
    showStatus("upload-status",
      "❌ Kamera tidak dapat diakses — izinkan di browser", "error");
  }
})();

// ── Ambil foto ────────────────────────────────────────────
function takePhoto() {
  const canvas = document.getElementById("snapshot");
  const ctx    = canvas.getContext("2d");
  canvas.width  = videoEl.videoWidth  || 640;
  canvas.height = videoEl.videoHeight || 480;
  ctx.drawImage(videoEl, 0, 0);

  canvas.toBlob(blob => {
    selfieBlob = blob;
    const ts   = new Date().toISOString().replace(/[:.]/g, "-");
    selfieFile = new File([blob], `selfie-${ts}.jpg`, { type:"image/jpeg" });

    const prev = document.getElementById("preview-img");
    prev.src   = URL.createObjectURL(blob);
    prev.style.display   = "block";
    videoEl.style.display = "none";

    showStatus("upload-status", "✅ Foto berhasil diambil — siap diupload", "success");
  }, "image/jpeg", 0.85);
}

// ── Upload ke Drive ───────────────────────────────────────
async function doUpload() {
  if (!selfieFile) { alert("⚠️ Ambil foto selfie terlebih dahulu"); return; }
  await uploadFileToDrive(selfieFile);
}

// ── GPS ───────────────────────────────────────────────────
navigator.geolocation.getCurrentPosition(
  pos => {
    gpsLat = pos.coords.latitude;
    gpsLng = pos.coords.longitude;
    document.getElementById("lat").textContent      = gpsLat.toFixed(7);
    document.getElementById("lng").textContent      = gpsLng.toFixed(7);
    document.getElementById("accuracy").textContent = Math.round(pos.coords.accuracy);
    validateGPS(gpsLat, gpsLng);
  },
  () => {
    const el = document.getElementById("gps-status");
    el.textContent = "❌ GPS gagal — izinkan akses lokasi di browser";
    el.style.cssText =
      "background:#fee2e2;color:#991b1b;padding:14px;border-radius:12px;font-weight:600;margin-bottom:20px;";
  },
  { enableHighAccuracy: true, timeout: 15000 }
);

function validateGPS(lat, lng) {
  const dist = haversineKm(lat, lng, AIRPORT_LAT, AIRPORT_LNG);
  const el   = document.getElementById("gps-status");
  if (dist <= RADIUS_KM) {
    el.className = "gps-valid";
    el.textContent = `✅ Dalam Radius Bandara (${dist.toFixed(2)} km)`;
  } else {
    el.className   = "";
    el.style.cssText =
      "background:#fee2e2;color:#991b1b;padding:14px;border-radius:12px;font-weight:600;margin-bottom:20px;";
    el.textContent = `❌ Di Luar Radius Bandara (${dist.toFixed(2)} km)`;
  }
}

function haversineKm(a, b, c, d) {
  const R = 6371, r = x => x*Math.PI/180;
  const dL = r(c-a), dO = r(d-b);
  const x  = Math.sin(dL/2)**2 + Math.cos(r(a))*Math.cos(r(c))*Math.sin(dO/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ── Submit absensi → Firestore ────────────────────────────
async function submitAttendance() {
  if (!gpsLat)     { alert("⚠️ Tunggu GPS selesai memuat"); return; }
  if (!selfieBlob) { alert("⚠️ Ambil foto selfie terlebih dahulu"); return; }

  const user = auth.currentUser;
  if (!user) { window.location.href = "index.html"; return; }

  showStatus("submit-status", "⏳ Menyimpan absensi...", "info");
  try {
    await db.collection("absensi").add({
      email:     user.email,
      uid:       user.uid,
      latitude:  gpsLat,
      longitude: gpsLng,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      status:    "hadir",
    });
    showStatus("submit-status", "✅ Absensi berhasil disimpan!", "success");
  } catch (err) {
    showStatus("submit-status", "❌ Gagal: " + err.message, "error");
  }
}

// ── Helpers ───────────────────────────────────────────────
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  const m = { success:["#dcfce7","#166534"], error:["#fee2e2","#991b1b"], info:["#dbeafe","#1e40af"] };
  const [bg, color] = m[type] || m.info;
  el.style.cssText =
    `display:block;background:${bg};color:${color};padding:12px 16px;` +
    `border-radius:12px;font-weight:600;font-size:15px;margin-top:10px;`;
  el.textContent = msg;
}

function logout() {
  auth.signOut().then(() => { localStorage.clear(); window.location.href = "index.html"; });
}
</script>
</body>
</html>
