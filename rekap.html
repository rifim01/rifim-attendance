```html
<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rekap Kehadiran</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#071226,
#0b1730
);

padding:30px;

color:white;

min-height:100vh;

}

.wrapper{

max-width:1400px;

margin:auto;

background:#ffffff08;

backdrop-filter:blur(10px);

padding:30px;

border-radius:30px;

box-shadow:
0 0 30px rgba(0,0,0,0.4);

}

h1{

font-size:40px;

margin-bottom:30px;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

overflow:hidden;

border-radius:20px;

}

th{

background:#111c44;

padding:15px;

text-align:left;

}

td{

padding:15px;

border-bottom:
1px solid #ffffff10;

}

.status{

padding:8px 14px;

border-radius:12px;

font-size:13px;

font-weight:600;

display:inline-block;

}

.hadir{

background:#16a34a;

}

.telat{

background:#eab308;

color:#000;

}

.alpha{

background:#ef4444;

}

.stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:20px;

margin-bottom:30px;

}

.card{

background:#09152f;

padding:25px;

border-radius:20px;

}

.card h2{

font-size:18px;

margin-bottom:10px;

}

.card h1{

font-size:50px;

margin:0;

}

</style>

</head>

<body>

<div class="wrapper">

<h1>
📊 Rekap Kehadiran
</h1>

<div class="stats">

<div class="card">

<h2>Total Hadir</h2>

<h1 id="hadirCount">
0
</h1>

</div>

<div class="card">

<h2>Total Terlambat</h2>

<h1 id="telatCount">
0
</h1>

</div>

<div class="card">

<h2>Total Alpha</h2>

<h1 id="alphaCount">
0
</h1>

</div>

</div>

<table>

<thead>

<tr>

<th>Nama</th>
<th>Cabang</th>
<th>Jabatan</th>
<th>Tanggal</th>
<th>Status</th>
<th>Jam</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyGh43bEXkoWaxXg7rCFzrZ4dpHFD1BLVE6tVmswgC0tB7lXlCuI3bdGRo2KIEKeHqiMw/exec?type=absensi";

async function loadData(){

try{

const response =
await fetch(
API_URL
);

const data =
await response.json();

console.log(data);

renderTable(data);

}catch(err){

console.log(err);

}

}

function renderTable(data){

const table =
document.getElementById(
"tableBody"
);

table.innerHTML = "";

let hadir = 0;
let telat = 0;
let alpha = 0;

data.forEach(row=>{

if(row.status==="Hadir")
hadir++;

if(row.status==="Terlambat")
telat++;

if(row.status==="Alpha")
alpha++;

let cls = "";

if(row.status==="Hadir")
cls = "hadir";

if(row.status==="Terlambat")
cls = "telat";

if(row.status==="Alpha")
cls = "alpha";

table.innerHTML += `

<tr>

<td>${row.nama||"-"}</td>

<td>${row.cabang||"-"}</td>

<td>${row.jabatan||"-"}</td>

<td>${row.tanggal||"-"}</td>

<td>

<span class="status ${cls}">
${row.status||"-"}
</span>

</td>

<td>${row.jam||"-"}</td>

</tr>

`;

});

document.getElementById(
"hadirCount"
).innerText = hadir;

document.getElementById(
"telatCount"
).innerText = telat;

document.getElementById(
"alphaCount"
).innerText = alpha;

}

loadData();

</script>

</body>
</html>
```
