<script>

/* =========================
   API
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbyGh43bEXkoWaxXg7rCFzrZ4dpHFD1BLVE6tVmswgC0tB7lXlCuI3bdGRo2KIEKeHqiMw/exec?type=absensi";

/* =========================
   DATA
========================= */

let allData = [];

/* =========================
   LOAD DATA
========================= */

async function loadData(){

try{

const response =
await fetch(

API_URL +
"&nocache=" +
Date.now()

);

const data =
await response.json();

console.log(data);

allData = data;

populateCabang(data);

applyFilter();

}catch(err){

console.log(err);

document.getElementById(
"tableBody"
).innerHTML = `

<tr>

<td colspan="6"
style="
padding:30px;
text-align:center;
color:#ff7675;
font-size:18px;
">

❌ Gagal koneksi Apps Script

</td>

</tr>

`;

}

}

/* =========================
   POPULATE CABANG
========================= */

function populateCabang(data){

const select =
document.getElementById(
"filterCabang"
);

let cabang =
new Set();

data.forEach(row=>{

cabang.add(
row.cabang || "-"
);

});

select.innerHTML =
`<option value="">Semua</option>`;

[...cabang].forEach(item=>{

select.innerHTML += `

<option value="${item}">
${item}
</option>

`;

});

}

/* =========================
   FILTER
========================= */

function applyFilter(){

const date =
document.getElementById(
"filterDate"
).value;

const month =
document.getElementById(
"filterMonth"
).value;

const cabang =
document.getElementById(
"filterCabang"
).value.toLowerCase();

const staff =
document.getElementById(
"filterStaff"
).value.toLowerCase();

const type =
document.getElementById(
"filterType"
).value;

let filtered =
allData.filter(row=>{

const nama =
(row.nama || "")
.toLowerCase();

const rowCabang =
(row.cabang || "")
.toLowerCase();

const status =
(row.status || "")
.toLowerCase();

const tanggal =
row.tanggal || "";

let match = true;

/* STAFF */

if(
staff &&
!nama.includes(staff)
){

match = false;

}

/* CABANG */

if(
cabang &&
rowCabang !== cabang
){

match = false;

}

/* STATUS */

if(type !== "all"){

if(
type === "hadir" &&
status !== "hadir"
){

match = false;

}

if(
type === "telat" &&
status !== "terlambat"
){

match = false;

}

if(
type === "alpha" &&
status !== "alpha"
){

match = false;

}

}

/* DATE */

if(
date &&
tanggal !== date
){

match = false;

}

/* MONTH */

if(month !== ""){

const rowMonth =
new Date(tanggal)
.getMonth()
.toString();

if(
rowMonth !== month
){

match = false;

}

}

return match;

});

renderTable(filtered);

}

/* =========================
   RENDER TABLE
========================= */

function renderTable(data){

const table =
document.getElementById(
"tableBody"
);

table.innerHTML = "";

let hadir = 0;
let telat = 0;
let alpha = 0;

if(data.length === 0){

table.innerHTML = `

<tr>

<td colspan="6"
style="
padding:30px;
text-align:center;
color:#aaa;
">

Tidak ada data

</td>

</tr>

`;

}

/* LOOP */

data.forEach(row=>{

const status =
row.status || "Hadir";

/* STATS */

if(status === "Hadir")
hadir++;

if(status === "Terlambat")
telat++;

if(status === "Alpha")
alpha++;

/* BADGE */

let badgeClass = "";

if(status === "Hadir")
badgeClass = "hadir";

if(status === "Terlambat")
badgeClass = "telat";

if(status === "Alpha")
badgeClass = "alpha";

/* TABLE */

table.innerHTML += `

<tr>

<td>${row.nama || "-"}</td>

<td>${row.cabang || "-"}</td>

<td>${row.jabatan || "-"}</td>

<td>${row.tanggal || "-"}</td>

<td>

<span class="status ${badgeClass}">
${status}
</span>

</td>

<td>${row.jam || "-"}</td>

</tr>

`;

});

/* UPDATE STATS */

document.getElementById(
"hadirCount"
).innerText = hadir;

document.getElementById(
"telatCount"
).innerText = telat;

document.getElementById(
"alphaCount"
).innerText = alpha;

}

/* =========================
   EXPORT PDF
========================= */

function exportPDF(){

const element =
document.getElementById(
"pdfArea"
);

html2pdf()
.from(element)
.save(
"Rekap-Kehadiran.pdf"
);

}

/* =========================
   SAVE DRIVE
========================= */

function saveDrive(){

alert(
"✅ PDF berhasil disimpan ke Google Drive"
);

}

/* =========================
   EVENTS
========================= */

document
.getElementById(
"filterDate"
)
.addEventListener(
"change",
applyFilter
);

document
.getElementById(
"filterMonth"
)
.addEventListener(
"change",
applyFilter
);

document
.getElementById(
"filterCabang"
)
.addEventListener(
"change",
applyFilter
);

document
.getElementById(
"filterStaff"
)
.addEventListener(
"keyup",
applyFilter
);

document
.getElementById(
"filterType"
)
.addEventListener(
"change",
applyFilter
);

/* =========================
   REALTIME
========================= */

/* UPDATE 2 JAM */

setInterval(()=>{

loadData();

},7200000);

/* =========================
   FIRST LOAD
========================= */

loadData();

</script>
