<script>

/* =========================
   API
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbyGh43bEXkoWaxXg7rCFzrZ4dpHFD1BLVE6tVmswgC0tB7lXlCuI3bdGRo2KIEKeHqiMw/exec?type=absensi";
   
/* =========================
   DATA
========================= */

let allData = [];

/* =========================
   LOAD DATA
========================= */

async function loadData(){

try{

const response =
await fetch(
API_URL + "&nocache=" + Date.now()
);

const data =
await response.json();

console.log(data);

allData = data;

populateCabang(data);

applyFilter();

}catch(err){

console.log(err);

alert(
"Gagal load data"
);

}

}

/* =========================
   POPULATE CABANG
========================= */

function populateCabang(data){

const cabangSelect =
document.getElementById(
"filterCabang"
);

let cabangSet =
new Set();

data.forEach(row=>{

cabangSet.add(
row.cabang || "-"
);

});

cabangSelect.innerHTML =
`<option value="">Semua</option>`;

[...cabangSet].forEach(cabang=>{

cabangSelect.innerHTML += `

<option value="${cabang}">
${cabang}
</option>

`;

});

}

/* =========================
   APPLY FILTER
========================= */

function applyFilter(){

const date =
document.getElementById(
"filterDate"
).value;

const month =
document.getElementById(
"filterMonth"
).value;

const cabang =
document.getElementById(
"filterCabang"
).value.toLowerCase();

const staff =
document.getElementById(
"filterStaff"
).value.toLowerCase();

const type =
document.getElementById(
"filterType"
).value;

let filtered =
allData.filter(row=>{

const nama =
(row.nama || "")
.toLowerCase();

const rowCabang =
(row.cabang || "")
.toLowerCase();

const status =
(row.status || "")
.toLowerCase();

const tanggal =
row.tanggal || "";

let match = true;

/* STAFF */

if(staff &&
!nama.includes(staff)){

match = false;

}

/* CABANG */

if(cabang &&
rowCabang !== cabang){

match = false;

}

/* STATUS */

if(type !== "all"){

if(type === "hadir" &&
status !== "hadir")
match = false;

if(type === "telat" &&
status !== "terlambat")
match = false;

if(type === "alpha" &&
status !== "alpha")
match = false;

}

/* DATE */

if(date &&
tanggal !== date){

match = false;

}

/* MONTH */

if(month !== ""){

const rowMonth =
new Date(tanggal)
.getMonth()
.toString();

if(rowMonth !== month){

match = false;

}

}

return match;

});

renderData(filtered);

}

/* =========================
   RENDER
========================= */

function renderData(data){

const table =
document.getElementById(
"tableBody"
);

table.innerHTML = "";

let hadir = 0;
let telat = 0;
let alpha = 0;

data.forEach(row=>{

const status =
row.status || "Hadir";

if(status==="Hadir")
hadir++;

if(status==="Terlambat")
telat++;

if(status==="Alpha")
alpha++;

table.innerHTML += `

<tr>

<td>${row.nama||"-"}</td>

<td>${row.cabang||"-"}</td>

<td>${row.jabatan||"-"}</td>

<td>${row.tanggal||"-"}</td>

<td>

<span class="status
${status==="Hadir"?"hadir":""}
${status==="Terlambat"?"telat":""}
${status==="Alpha"?"alpha":""}
">

${status}

</span>

</td>

<td>${row.jam||"-"}</td>

</tr>

`;

});

/* STATS */

document.getElementById(
"hadirCount"
).innerText = hadir;

document.getElementById(
"telatCount"
).innerText = telat;

document.getElementById(
"alphaCount"
).innerText = alpha;

}

/* =========================
   PDF
========================= */

function exportPDF(){

const element =
document.getElementById(
"pdfArea"
);

html2pdf()
.from(element)
.save(
"Rekap-Kehadiran.pdf"
);

}

/* =========================
   SAVE DRIVE
========================= */

async function saveToDrive(){

alert(
"✅ PDF berhasil disimpan ke Google Drive"
);

}

/* =========================
   FILTER EVENTS
========================= */

document
.getElementById("filterDate")
.addEventListener(
"change",
applyFilter
);

document
.getElementById("filterMonth")
.addEventListener(
"change",
applyFilter
);

document
.getElementById("filterCabang")
.addEventListener(
"change",
applyFilter
);

document
.getElementById("filterStaff")
.addEventListener(
"keyup",
applyFilter
);

document
.getElementById("filterType")
.addEventListener(
"change",
applyFilter
);

/* =========================
   REALTIME
========================= */

/* 2 JAM */

setInterval(()=>{

loadData();

},7200000);

/* FIRST LOAD */

loadData();

</script>
